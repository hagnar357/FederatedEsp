# LORA
# CONFIG_LORA=y
# CONFIG_MAIN_STACK_SIZE=2048
# CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# LOG
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# pra usar printf
CONFIG_NEWLIB_LIBC=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y

# Wi-Fi Configuration
CONFIG_WIFI=y

CONFIG_WIFI_ESP32=y
CONFIG_WIFI_LOG_LEVEL_INF=y


# Network Configuration
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_IPV4=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=10
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NETWORKING=y

# LOG Configuration
CONFIG_NET_LOG=y
CONFIG_NET_DHCPV4_SERVER_LOG_LEVEL_DBG=y



# --- Rede básica ---
CONFIG_NET_IPV6=n
CONFIG_NET_SOCKETS=y


# --- Gerenciamento de rede ---
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_THREAD=y

# --- WebSocket & HTTP ---
CONFIG_HTTP_CLIENT=y
CONFIG_WEBSOCKET_CLIENT=y


# --- Gerenciamento de Memória e Stack ---
# Aumenta o Heap global para o k_malloc (Ajuste para 32KB, 64KB ou mais, dependendo do tamanho da sua rede neural)
CONFIG_HEAP_MEM_POOL_SIZE=65536 

# Aumenta a pilha da thread principal para lidar com a recursividade do cJSON e buffers de rede
CONFIG_MAIN_STACK_SIZE=8192

# --- Sistema de Arquivos (LittleFS) ---
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# --- Sensores e Barramentos ---
CONFIG_I2C=y

# --- Suporte a Ponto Flutuante (Floats) nos Logs ---
CONFIG_CBPRINTF_FP_SUPPORT=y

#===aaa
# --- Suporte a GPIO ---
CONFIG_GPIO=y

# --- Suporte Avançado de Wi-Fi ---
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_WIFI_LOG_LEVEL_INF=y

# Degub
# CONFIG_WIFI_LOG_LEVEL_ERR=y
# CONFIG_NET_DHCPV4_LOG_LEVEL_DBG=y
# CONFIG_NET_IPV4_LOG_LEVEL_DBG=y